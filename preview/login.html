<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ticketfasta Mail — Local Preview</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../branding/mailcow-ui/custom.css" rel="stylesheet">
  <link href="preview.css" rel="stylesheet">
</head>
<body class="tf-login-page">
  <div class="tf-login-page__orb tf-login-page__orb--left" aria-hidden="true"></div>
  <div class="tf-login-page__orb tf-login-page__orb--right" aria-hidden="true"></div>
  <div class="tf-login-page__dots" aria-hidden="true"></div>

  <div class="row mb-4 preview-wrap">
    <div class="col-12 col-md-7 col-lg-6 col-xl-5 ms-auto me-auto">
      <div class="card shadow-sm tf-login-card">
        <div class="card-header d-flex align-items-center">
          <i class="bi bi-person-fill me-2"></i> User Login
          
        </div>
        <div class="card-body">
         

          <div class="tf-powered-by text-center mb-4">
            <div class="tf-powered-by__logo mx-auto">
              <img src="../branding/mailcow-ui/tera-logo.png" alt="TERA" height="36">
            </div>
            <p class="tf-powered-by__label mb-0">Ticketfasta Mail</p>
            <p class="tf-powered-by__text mb-0">Ticketfasta is powered by <strong>TERA</strong></p>
          </div>

          <legend class="h5">Sign in to continue</legend>
          <hr>
          <form onsubmit="return false;">
            <div class="d-flex mt-3">
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                <input type="text" class="form-control" placeholder="Email address">
              </div>
            </div>
            <div class="d-flex mt-3">
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" class="form-control" placeholder="Password">
              </div>
            </div>
            <div class="d-flex justify-content-between mt-4">
              <button type="button" class="btn btn-success w-100" style="max-width:400px;margin:0 auto">Login</button>
            </div>
          </form>

       
        </div>
      </div>
      <p class="text-center mt-3 text-muted" style="font-size: 0.9rem;">
        Not the correct login?<br>
        <a href="#">Log in as admin</a> | <a href="#">Log in as domain admin</a>
      </p>
      
    </div>
  </div>
</body>
</html>
